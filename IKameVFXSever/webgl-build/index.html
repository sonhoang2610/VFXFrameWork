<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>VFX Viewer</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0c0d10; }
      #unity-canvas { width: 100%; height: 100%; display: block; }
      #unity-loading-bar { display: none; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
      #unity-progress-bar-empty { width: 200px; height: 4px; background: #1a1d22; border-radius: 2px; }
      #unity-progress-bar-full { width: 0; height: 100%; background: #7c4dff; border-radius: 2px; }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/webgl-build.loader.js";
      var config = {
        dataUrl: buildUrl + "/webgl-build.data",
        frameworkUrl: buildUrl + "/webgl-build.framework.js",
        codeUrl: buildUrl + "/webgl-build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "iKame",
        productName: "IKAME_VFX",
        productVersion: "0.1.0",
      };

      canvas.style.width = "100%";
      canvas.style.height = "100%";

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then(function(instance) {
          document.querySelector("#unity-loading-bar").style.display = "none";

          window.unityInstance = instance;

          // Listen for commands from parent frame (VFX Hub web)
          window.addEventListener("message", function(e) {
            if (!e.data || e.data.type !== "unity-command") return;
            var method = e.data.method;
            var args = e.data.args || "";
            try {
              instance.SendMessage("ParticleViewer", method, args);
            } catch (err) {
              console.warn("[WebGL] SendMessage failed:", err);
            }
          });

        }).catch(function(message) {
          console.error("[WebGL] Init error:", message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
