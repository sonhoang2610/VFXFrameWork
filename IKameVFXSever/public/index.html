<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IKAME VFX Hub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header bar -->
  <header>
    <div class="logo">&#127878; IKAME VFX Hub</div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search VFX...">
    </div>
    <div class="auth-section">
      <!-- Google login button (placeholder for now) -->
      <button id="login-btn" class="btn-login">Login with Google</button>
      <div id="user-info" class="hidden">
        <span id="user-name"></span>
        <button id="logout-btn" class="btn-logout">Logout</button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <div class="main-layout">
    <!-- Sidebar: category tree -->
    <aside class="sidebar">
      <h3>Categories</h3>
      <div id="category-tree"></div>
    </aside>

    <!-- Grid of VFX cards -->
    <main class="content">
      <div class="content-header">
        <span id="result-count"></span>
        <span id="current-category"></span>
      </div>
      <div id="vfx-grid" class="vfx-grid"></div>
      <div id="loading-indicator" class="hidden">Loading...</div>
    </main>
  </div>

  <!-- Detail modal -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div class="modal-body">
        <img id="modal-gif" class="modal-gif" alt="VFX Preview">
        <div class="modal-info">
          <h2 id="modal-name"></h2>
          <div class="modal-meta">
            <span>Category: <span id="modal-category"></span></span>
            <span>Particles: <span id="modal-particles"></span></span>
            <span>Size: <span id="modal-size"></span></span>
            <span>Uploaded: <span id="modal-date"></span></span>
            <span>By: <span id="modal-author"></span></span>
          </div>
          <div class="modal-deps">
            <h4>Dependencies</h4>
            <ul id="modal-deps-list"></ul>
          </div>
          <button id="modal-download" class="btn-download">&#11015; Download Package</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/catalog.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
